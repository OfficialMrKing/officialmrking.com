<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR_KING</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/OfficialMrKing/officialmrking.com/main/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            background-color: #050505; /* Deep black to blend with image backgrounds */
            overflow-x: hidden;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 8px rgba(168, 85, 247, 0.4), inset 0 0 4px rgba(168, 85, 247, 0.2);
                border-color: #9333ea;
            }
            50% {
                box-shadow: 0 0 24px rgba(168, 85, 247, 0.9), inset 0 0 12px rgba(168, 85, 247, 0.6);
                border-color: #d8b4fe;
            }
        }

        .neon-purple-btn {
            background-color: #000000;
            border: 2px solid #a855f7;
            animation: pulse-glow 2.5s infinite ease-in-out;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        
        .neon-purple-btn:hover {
            animation: none;
            box-shadow: 0 0 32px rgba(168, 85, 247, 1), inset 0 0 16px rgba(168, 85, 247, 0.8);
            border-color: #e9d5ff;
            transform: translateY(-2px);
        }

        .glow-text {
            color: #ffffff;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.8), 
                         0 0 30px rgba(168, 85, 247, 0.6), 
                         0 0 45px rgba(168, 85, 247, 0.4);
        }

        .glow-label {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.8), 0 0 20px rgba(168, 85, 247, 0.6), 0 0 30px rgba(168, 85, 247, 0.4);
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        /* Animation classes for the white star */
        #white-star {
            position: absolute;
            top: 50%;
            /* Screen mode removes the black background from the JPEG */
            mix-blend-mode: screen; 
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 30;
            pointer-events: none;
        }

        .star-hidden {
            left: 50%;
            transform: translate(-50%, -50%) scale(0) rotate(-45deg);
            opacity: 0;
        }

        .star-zoomed {
            /* Zooms into the left part of the screen and becomes massive */
            left: 20%;
            transform: translate(-50%, -50%) scale(8) rotate(15deg);
            opacity: 1;
        }
        
        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans antialiased text-white">

    <!-- Hamburger Menu Button -->
    <button onclick="toggleSidebar()" class="fixed top-6 left-6 z-[60] flex flex-col justify-between w-8 h-6 group cursor-pointer focus:outline-none drop-shadow-[0_0_8px_rgba(168,85,247,0.8)]">
        <span class="w-full h-1 bg-[#a855f7] rounded group-hover:bg-[#d8b4fe] transition-colors shadow-[0_0_8px_rgba(168,85,247,0.8)]"></span>
        <span class="w-full h-1 bg-[#a855f7] rounded group-hover:bg-[#d8b4fe] transition-colors shadow-[0_0_8px_rgba(168,85,247,0.8)]"></span>
        <span class="w-full h-1 bg-[#a855f7] rounded group-hover:bg-[#d8b4fe] transition-colors shadow-[0_0_8px_rgba(168,85,247,0.8)]"></span>
    </button>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-70 z-[40] hidden transition-opacity duration-300 opacity-0"></div>

    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-black border-r-2 border-[#a855f7] z-[50] transform -translate-x-full transition-transform duration-300 pt-24 px-8 shadow-[4px_0_24px_rgba(168,85,247,0.3)]">
        <div class="flex flex-col gap-8">
            <button onclick="switchView('home')" class="text-left text-2xl font-bold text-white hover:text-[#d8b4fe] transition-colors tracking-widest drop-shadow-[0_0_10px_rgba(168,85,247,0.8)] focus:outline-none">HOME</button>
            <button onclick="switchView('ign')" class="text-left text-2xl font-bold text-white hover:text-[#d8b4fe] transition-colors tracking-widest drop-shadow-[0_0_10px_rgba(168,85,247,0.8)] focus:outline-none">IGNs</button>
            <button onclick="switchView('coming-soon')" class="text-left text-2xl font-bold text-white hover:text-[#d8b4fe] transition-colors tracking-widest drop-shadow-[0_0_10px_rgba(168,85,247,0.8)] focus:outline-none">COMING SOON</button>
        </div>
    </div>

    <!-- Main Content Container -->
    <div class="w-full flex-1 relative">
        
        <!-- ================= HOME / TITLE SCREEN VIEW ================= -->
        <div id="view-home" class="block w-full">
            <!-- This empty div creates the large scrollable area -->
            <div class="h-[400vh] w-full"></div> 

            <!-- Fixed elements that stay on screen while you scroll down -->
            <div id="home-fixed-content" class="fixed inset-0 w-full h-full flex flex-col items-center justify-center pointer-events-none z-10">
                
                <!-- The Ring of Stars (Spins on scroll) -->
                <img id="circle-stars" 
                     src="./all.jpeg" 
                     onerror="this.src='https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=1000&auto=format&fit=crop'" 
                     class="absolute top-1/2 left-1/2 w-[85vw] max-w-[600px] aspect-square object-cover rounded-full shadow-[0_0_50px_rgba(168,85,247,0.3)]" 
                     style="transform: translate(-50%, -50%) rotate(0deg);" 
                     alt="Circle of Stars">

                <!-- MR_KING Text inside the circle -->
                <h1 id="main-text" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-5xl md:text-8xl font-extrabold text-white tracking-widest glow-text uppercase z-20 transition-transform duration-700">
                    MR_KING
                </h1>

                <!-- The White Star (Hidden initially, zooms in on scroll) -->
                <img id="white-star" 
                     src="./whitestar.jpeg" 
                     onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Full_Star_Yellow.svg/1024px-Full_Star_Yellow.svg.png'; this.style.mixBlendMode='normal';" 
                     class="star-hidden w-48 h-48 object-contain drop-shadow-[0_0_30px_white]" 
                     alt="White Star">

                <!-- Scroll Down Indicator -->
                <div id="scroll-indicator" class="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center text-purple-400 animate-pulse z-40">
                    <span class="text-sm font-bold tracking-widest mb-2 uppercase">Scroll Down</span>
                    <svg class="w-6 h-6 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                    </svg>
                </div>
            </div>
        </div>

        <!-- ================= IGN VIEW ================= -->
        <div id="view-ign" class="hidden absolute top-0 left-0 w-full min-h-screen flex flex-col items-center justify-center p-4 z-20">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-12 text-white drop-shadow-[0_0_15px_rgba(168,85,247,0.8)] tracking-widest text-center glow-text uppercase">
                IN GAME NAME:
            </h1>
            <div class="flex flex-col gap-8 w-full max-w-2xl mx-auto items-center">
                <div class="flex flex-col md:flex-row items-center gap-4 md:gap-12 w-full justify-center">
                    <button onclick="window.open('https://namemc.com/profile/OfficialMr_King.1', '_blank')" class="w-48 px-6 py-3 neon-purple-btn text-white text-xl uppercase font-bold rounded hover:scale-105 active:scale-95 transition-transform duration-150">Minecraft</button>
                    <span class="glow-label text-2xl font-extrabold w-64 text-center md:text-left">OFFICIALMR_KING</span>
                </div>
                <div class="flex flex-col md:flex-row items-center gap-4 md:gap-12 w-full justify-center">
                    <button onclick="window.open('https://www.roblox.com/users/2739223043/profile', '_blank')" class="w-48 px-6 py-3 neon-purple-btn text-white text-xl uppercase font-bold rounded hover:scale-105 active:scale-95 transition-transform duration-150">Roblox</button>
                    <span class="glow-label text-2xl font-extrabold w-64 text-center md:text-left">OFFICIALMR_KING</span>
                </div>
                <div class="flex flex-col md:flex-row items-center gap-4 md:gap-12 w-full justify-center">
                    <button onclick="window.open('https://fortnitetracker.com/profile/all/OfficialMrKing', '_blank')" class="w-48 px-6 py-3 neon-purple-btn text-white text-xl uppercase font-bold rounded hover:scale-105 active:scale-95 transition-transform duration-150">Fortnite</button>
                    <span class="glow-label text-2xl font-extrabold w-64 text-center md:text-left">OFFICIALMRKING</span>
                </div>
                <div class="flex flex-col md:flex-row items-center gap-4 md:gap-12 w-full justify-center">
                    <button onclick="window.open('https://steamcommunity.com/id/OfficialMr_King', '_blank')" class="w-48 px-6 py-3 neon-purple-btn text-white text-xl uppercase font-bold rounded hover:scale-105 active:scale-95 transition-transform duration-150">Steam</button>
                    <span class="glow-label text-2xl font-extrabold w-64 text-center md:text-left">OFFICIALMR_KING</span>
                </div>
            </div>
        </div>

        <!-- ================= COMING SOON VIEW ================= -->
        <div id="view-coming-soon" class="hidden absolute top-0 left-0 w-full min-h-screen flex flex-col items-center justify-center z-20">
            <h1 class="text-5xl md:text-7xl font-extrabold text-white drop-shadow-[0_0_25px_rgba(168,85,247,1)] tracking-widest animate-pulse glow-text uppercase text-center px-4">COMING SOON</h1>
        </div>
    </div>

    <script>
        // -- Sidebar Logic --
        let sidebarOpen = false;
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebarOpen = !sidebarOpen;
            sidebar.classList.toggle('-translate-x-full', !sidebarOpen);
            overlay.classList.toggle('hidden', !sidebarOpen);
            setTimeout(() => overlay.classList.toggle('opacity-0', !sidebarOpen), 10);
        }

        function switchView(viewId) {
            // Hide all views
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-ign').classList.add('hidden');
            document.getElementById('view-coming-soon').classList.add('hidden');

            // Show selected view
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            
            // If returning to home, reset scroll to top
            if (viewId === 'home') {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // Close sidebar
            if(sidebarOpen) toggleSidebar();
        }

        // -- Scroll Animation Logic --
        document.addEventListener('DOMContentLoaded', () => {
            const circleStars = document.getElementById('circle-stars');
            const whiteStar = document.getElementById('white-star');
            const scrollIndicator = document.getElementById('scroll-indicator');
            const mainText = document.getElementById('main-text');

            // Amount of scroll pixels before the white star zooms in
            const ZOOM_THRESHOLD = 700; 

            window.addEventListener('scroll', () => {
                // Only animate if the home view is currently visible
                if (document.getElementById('view-home').classList.contains('hidden')) return;

                const scrollY = window.scrollY;

                // 1. Spin the center star circle based on scroll distance.
                // Multiply scrollY to adjust spin speed.
                circleStars.style.transform = `translate(-50%, -50%) rotate(${scrollY * 0.2}deg)`;

                // 2. Hide scroll indicator once user starts scrolling
                if (scrollY > 50) {
                    scrollIndicator.classList.add('fade-out');
                } else {
                    scrollIndicator.classList.remove('fade-out');
                }

                // 3. Zoom the white star into the left side of the screen past threshold
                if (scrollY > ZOOM_THRESHOLD) {
                    whiteStar.classList.remove('star-hidden');
                    whiteStar.classList.add('star-zoomed');
                    
                    // Shift the MR_KING text slightly right to make room
                    mainText.style.transform = `translate(-20%, -50%) scale(0.9)`;
                } else {
                    whiteStar.classList.add('star-hidden');
                    whiteStar.classList.remove('star-zoomed');
                    
                    // Restore main text position
                    mainText.style.transform = `translate(-50%, -50%) scale(1)`;
                }
            });
        });
    </script>
</body>
</html>
