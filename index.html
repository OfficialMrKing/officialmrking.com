<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR_KING</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/OfficialMrKing/officialmrking.com/main/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 8px rgba(168, 85, 247, 0.4), inset 0 0 4px rgba(168, 85, 247, 0.2);
                border-color: #9333ea;
            }
            50% {
                box-shadow: 0 0 24px rgba(168, 85, 247, 0.9), inset 0 0 12px rgba(168, 85, 247, 0.6);
                border-color: #d8b4fe;
            }
        }

        @keyframes shrink-bar {
            from { width: 100%; }
            to { width: 0%; }
        }

        .shrink-animation {
            animation: shrink-bar 3s linear forwards;
        }

        .neon-purple-btn {
            background-color: #000000;
            border: 2px solid #a855f7;
            animation: pulse-glow 2.5s infinite ease-in-out;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        
        .neon-purple-btn:hover {
            animation: none;
            box-shadow: 0 0 32px rgba(168, 85, 247, 1), inset 0 0 16px rgba(168, 85, 247, 0.8);
            border-color: #e9d5ff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-black min-h-screen flex flex-col items-center justify-center p-4 font-sans antialiased text-white overflow-x-hidden">

    <!-- Hamburger Menu Button -->
    <button onclick="toggleSidebar()" class="fixed top-6 left-6 z-[60] flex flex-col justify-between w-8 h-6 group cursor-pointer focus:outline-none">
        <span class="w-full h-1 bg-[#a855f7] rounded group-hover:bg-[#d8b4fe] transition-colors shadow-[0_0_8px_rgba(168,85,247,0.8)]"></span>
        <span class="w-full h-1 bg-[#a855f7] rounded group-hover:bg-[#d8b4fe] transition-colors shadow-[0_0_8px_rgba(168,85,247,0.8)]"></span>
        <span class="w-full h-1 bg-[#a855f7] rounded group-hover:bg-[#d8b4fe] transition-colors shadow-[0_0_8px_rgba(168,85,247,0.8)]"></span>
    </button>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-70 z-[40] hidden transition-opacity duration-300 opacity-0"></div>

    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-black border-r-2 border-[#a855f7] z-[50] transform -translate-x-full transition-transform duration-300 pt-24 px-8 shadow-[4px_0_24px_rgba(168,85,247,0.6)]">
        <div class="flex flex-col gap-8">
            <button onclick="switchView('coming-soon')" class="text-left text-2xl font-bold text-white hover:text-[#d8b4fe] transition-colors tracking-widest drop-shadow-[0_0_10px_rgba(168,85,247,0.8)] focus:outline-none">COMING SOON</button>
            <button onclick="switchView('ign')" class="text-left text-2xl font-bold text-white hover:text-[#d8b4fe] transition-colors tracking-widest drop-shadow-[0_0_10px_rgba(168,85,247,0.8)] focus:outline-none">IN GAME NAME</button>
        </div>
    </div>

    <div class="w-full flex-1 flex flex-col items-center justify-center relative">
        <div id="view-ign" class="w-full flex flex-col items-center transition-all duration-300">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-10 text-white drop-shadow-[0_0_15px_rgba(168,85,247,0.8)] tracking-widest text-center mt-8">
                IN GAME NAME:
            </h1>
            <div class="flex flex-col gap-4 w-max">
                <div class="flex items-center gap-6"><button onclick="window.open('https://namemc.com/profile/OfficialMr_King.1', '_blank')" class="w-48 px-6 py-3 neon-purple-btn text-white font-semibold rounded-xl">MINECRAFT</button><span class="text-xl font-semibold text-white">OfficialMr_King</span></div>
                <div class="flex items-center gap-6"><button onclick="window.open('https://www.roblox.com/users/2739223043/profile', '_blank')" class="w-48 px-6 py-3 neon-purple-btn text-white font-semibold rounded-xl">ROBLOX</button><span class="text-xl font-semibold text-white">OfficalMr_King
                </span></div>
                <div class="flex items-center gap-6"><button onclick="window.open('https://fortnitetracker.com/profile/all/OfficialMrKing', '_blank')" class="w-48 px-6 py-3 neon-purple-btn text-white font-semibold rounded-xl">FORTNITE</button><span class="text-xl font-semibold text-white">OfficialMrKing</span></div>
                <div class="flex items-center gap-6"><button onclick="window.open('https://steamcommunity.com/id/OfficialMr_King', '_blank')" class="w-48 px-6 py-3 neon-purple-btn text-white font-semibold rounded-xl">STEAM</button><span class="text-xl font-semibold text-white">OfficialMr_King</span></div>
            </div>
        </div>

        <div id="view-coming-soon" class="hidden w-full flex flex-col items-center justify-center absolute inset-0 transition-all duration-300">
            <h1 class="text-5xl md:text-7xl font-extrabold text-white drop-shadow-[0_0_25px_rgba(168,85,247,1)] tracking-widest animate-pulse">COMING SOON</h1>
        </div>
    </div>

    <script>
        let sidebarOpen = false;
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebarOpen = !sidebarOpen;
            sidebar.classList.toggle('-translate-x-full', !sidebarOpen);
            overlay.classList.toggle('hidden', !sidebarOpen);
            setTimeout(() => overlay.classList.toggle('opacity-0', !sidebarOpen), 10);
        }

        function switchView(viewId) {
            document.getElementById('view-ign').classList.toggle('hidden', viewId === 'coming-soon');
            document.getElementById('view-coming-soon').classList.toggle('hidden', viewId !== 'coming-soon');
            if(sidebarOpen) toggleSidebar();
        }
    </script>
</body>
</html>
